id: "secure_pcornet_cdw"
name: "Secure PCORnet CDW"
cdm: "pcornet"
cdm_version: "7"
engine: "mssql"
engine_version: "17.0.27"
online: false

connection:
  r_code: |
    con <- DBI::dbConnect(odbc::odbc(), "SQLODBCD17CDM")
    DBI::dbExecute(con, "USE CDW")

# Master Patient Index lives in a separate database on the same SQL Server.
# Used by CDW_DB_Profiler.qmd to dump the MPI schema and append a
# (PHI-safe, aggregate-only) MPI section to the data profile.
mpi_connection:
  r_code: |
    con <- DBI::dbConnect(odbc::odbc(), "SQLODBCD17CDM")
    DBI::dbExecute(con, "USE MasterPatientIndex")

schema_prefix: "CDW.dbo"
schema_dump: "databases/schemas/secure_pcornet_cdw_schema.txt"
mpi_schema_dump: "databases/schemas/secure_pcornet_cdw_mpi_schema.txt"
data_profile: "databases/profiles/secure_pcornet_cdw_profile.md"
conventions: "databases/conventions/secure_pcornet_cdw_conventions.md"
